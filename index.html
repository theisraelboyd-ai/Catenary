<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catenary Suite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0f14">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#0d0f14;font-family:'Space Grotesk',system-ui,sans-serif;color:#e8eaf0;display:flex;align-items:center;justify-content:center;}
  .splash{text-align:center;padding:32px;}
  .logo{font-size:28px;font-weight:700;color:#3b8cf7;letter-spacing:-0.5px;margin-bottom:6px;}
  .sub{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:#555d72;margin-bottom:32px;}
  .spinner{width:36px;height:36px;border:3px solid rgba(59,140,247,0.15);border-top-color:#3b8cf7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .redirect-msg{font-size:12px;color:#555d72;}
  .manual-links{margin-top:24px;display:flex;gap:12px;justify-content:center;}
  .manual-link{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;border:1px solid rgba(255,255,255,0.1);color:#8b92a8;transition:all 0.15s;}
  .manual-link:hover{border-color:#3b8cf7;color:#3b8cf7;background:rgba(59,140,247,0.08);}
</style>
</head>
<body>
<div class="splash">
  <div class="logo">Catenary Suite</div>
  <div class="sub">Submarine Cable Analysis Engine</div>
  <div class="spinner"></div>
  <div class="redirect-msg" id="msg">Detecting your device…</div>
  <div class="manual-links">
    <a class="manual-link" href="desktop.html">Desktop App</a>
    <a class="manual-link" href="mobile.html">Mobile App</a>
  </div>
</div>
<script>
  function isMobileDevice(){
    const touch=('ontouchstart' in window)||(navigator.maxTouchPoints>1);
    const narrow=window.screen.width<=1024||window.innerWidth<=1024;
    const ua=/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet/i.test(navigator.userAgent);
    return [touch,narrow,ua].filter(Boolean).length>=2;
  }
  const mobile=isMobileDevice();
  const target=mobile?'mobile.html':'desktop.html';
  const label=mobile?'Mobile Field App':'Desktop Analysis Suite';
  document.getElementById('msg').textContent='Launching '+label+'…';
  setTimeout(()=>{window.location.replace(target);},600);
</script>
</body>
</html>
